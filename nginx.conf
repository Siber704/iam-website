# Nginx конфигурация для сайта "Я Есть"
# Project 02 — i-am.site (пример домена)
# Автор: Денис (2026-03-08)

# Перенаправление HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name i-am.site www.i-am.site;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS-сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name i-am.site www.i-am.site;

    # SSL сертификаты (Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/i-am.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i-am.site/privkey.pem;

    # Безопасность SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (строгая безопасность транспорта)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Корневая директория сайта
    root /var/www/iam-site;
    index index.html;

    # Кеширование статики
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Основной location
    location / {
        try_files $uri $uri/ /index.html;
        # SPA-поддержка: все пути → index.html
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Логи
    access_log /var/log/nginx/iam-site.access.log;
    error_log  /var/log/nginx/iam-site.error.log warn;
}
